<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Capy Rage 1: Calm, smiling, holding quill gently -->
  <!-- Body -->
  <ellipse cx="60" cy="75" rx="35" ry="28" fill="#C4A882" stroke="#1A1A1A" stroke-width="2.5"/>
  <!-- Belly -->
  <ellipse cx="60" cy="80" rx="22" ry="18" fill="#FAF3E8"/>
  <!-- Head -->
  <ellipse cx="60" cy="42" rx="25" ry="22" fill="#C4A882" stroke="#1A1A1A" stroke-width="2.5"/>
  <!-- Ears -->
  <ellipse cx="42" cy="26" rx="8" ry="6" fill="#C4A882" stroke="#1A1A1A" stroke-width="2"/>
  <ellipse cx="42" cy="26" rx="5" ry="3.5" fill="#F5C6C6"/>
  <ellipse cx="78" cy="26" rx="8" ry="6" fill="#C4A882" stroke="#1A1A1A" stroke-width="2"/>
  <ellipse cx="78" cy="26" rx="5" ry="3.5" fill="#F5C6C6"/>
  <!-- Eyes - calm dots -->
  <circle cx="50" cy="40" r="3" fill="#1A1A1A"/>
  <circle cx="70" cy="40" r="3" fill="#1A1A1A"/>
  <!-- Eye shine -->
  <circle cx="51" cy="39" r="1" fill="#FFFFFF"/>
  <circle cx="71" cy="39" r="1" fill="#FFFFFF"/>
  <!-- Nose -->
  <ellipse cx="60" cy="48" rx="4" ry="2.5" fill="#1A1A1A"/>
  <!-- Smile -->
  <path d="M52 52 Q60 58 68 52" fill="none" stroke="#1A1A1A" stroke-width="2" stroke-linecap="round"/>
  <!-- Small heart above head -->
  <path d="M58 12 C55 8 48 8 48 14 C48 18 58 24 58 24 C58 24 68 18 68 14 C68 8 61 8 58 12Z" fill="#D32F2F" opacity="0.6"/>
  <!-- Left arm holding quill -->
  <line x1="32" y1="65" x2="18" y2="50" stroke="#1A1A1A" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Quill -->
  <line x1="18" y1="50" x2="12" y2="28" stroke="#1A1A1A" stroke-width="1.5"/>
  <path d="M12 28 L9 32 L15 30 Z" fill="#2D6A4F"/>
  <path d="M12 28 L10 24 L14 26 Z" fill="#2D6A4F"/>
  <!-- Right arm -->
  <line x1="88" y1="65" x2="95" y2="75" stroke="#1A1A1A" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Feet -->
  <ellipse cx="45" cy="100" rx="10" ry="5" fill="#C4A882" stroke="#1A1A1A" stroke-width="2"/>
  <ellipse cx="75" cy="100" rx="10" ry="5" fill="#C4A882" stroke="#1A1A1A" stroke-width="2"/>
</svg>
