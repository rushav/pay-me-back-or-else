<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120">
  <!-- Capy Rage 4: Standing, quill raised like sword, flame eyes, papers flying -->
  <!-- Papers flying -->
  <rect x="8" y="15" width="14" height="10" rx="1" fill="#FAF3E8" stroke="#1A1A1A" stroke-width="1" transform="rotate(-20 15 20)" opacity="0.7"/>
  <rect x="95" y="10" width="14" height="10" rx="1" fill="#FAF3E8" stroke="#1A1A1A" stroke-width="1" transform="rotate(15 102 15)" opacity="0.7"/>
  <rect x="100" y="35" width="12" height="8" rx="1" fill="#FAF3E8" stroke="#1A1A1A" stroke-width="1" transform="rotate(25 106 39)" opacity="0.5"/>
  <!-- Body - standing upright -->
  <ellipse cx="60" cy="78" rx="28" ry="25" fill="#C4A882" stroke="#1A1A1A" stroke-width="2.5"/>
  <!-- Belly -->
  <ellipse cx="60" cy="82" rx="18" ry="16" fill="#FAF3E8"/>
  <!-- Head -->
  <ellipse cx="60" cy="40" rx="25" ry="22" fill="#C4A882" stroke="#1A1A1A" stroke-width="2.5"/>
  <!-- Wind-blown fur tufts -->
  <path d="M85 35 L92 30 L88 38" fill="#C4A882" stroke="#1A1A1A" stroke-width="1.5"/>
  <path d="M83 28 L90 22 L86 30" fill="#C4A882" stroke="#1A1A1A" stroke-width="1.5"/>
  <!-- Ears -->
  <ellipse cx="42" cy="22" rx="8" ry="6" fill="#C4A882" stroke="#1A1A1A" stroke-width="2"/>
  <ellipse cx="42" cy="22" rx="5" ry="3.5" fill="#F5C6C6"/>
  <ellipse cx="78" cy="22" rx="8" ry="6" fill="#C4A882" stroke="#1A1A1A" stroke-width="2"/>
  <ellipse cx="78" cy="22" rx="5" ry="3.5" fill="#F5C6C6"/>
  <!-- Flame eyes -->
  <path d="M46 36 Q50 30 54 36 Q50 42 46 36Z" fill="#D32F2F" stroke="#1A1A1A" stroke-width="1.5"/>
  <path d="M48 36 Q50 32 52 36" fill="#F9A825" stroke="none"/>
  <path d="M66 36 Q70 30 74 36 Q70 42 66 36Z" fill="#D32F2F" stroke="#1A1A1A" stroke-width="1.5"/>
  <path d="M68 36 Q70 32 72 36" fill="#F9A825" stroke="none"/>
  <!-- Angry eyebrows -->
  <line x1="42" y1="26" x2="56" y2="31" stroke="#1A1A1A" stroke-width="3" stroke-linecap="round"/>
  <line x1="78" y1="26" x2="64" y2="31" stroke="#1A1A1A" stroke-width="3" stroke-linecap="round"/>
  <!-- Nose -->
  <ellipse cx="60" cy="46" rx="4" ry="2.5" fill="#1A1A1A"/>
  <!-- Open screaming mouth -->
  <ellipse cx="60" cy="54" rx="12" ry="7" fill="#1A1A1A"/>
  <ellipse cx="60" cy="53" rx="9" ry="4" fill="#D32F2F"/>
  <!-- Teeth -->
  <rect x="52" y="50" width="4" height="3" fill="#FFFFFF" rx="1"/>
  <rect x="57" y="50" width="4" height="3" fill="#FFFFFF" rx="1"/>
  <rect x="63" y="50" width="4" height="3" fill="#FFFFFF" rx="1"/>
  <!-- Right arm raised with quill like sword -->
  <line x1="88" y1="65" x2="100" y2="30" stroke="#1A1A1A" stroke-width="3" stroke-linecap="round"/>
  <!-- Quill raised high -->
  <line x1="100" y1="30" x2="102" y2="5" stroke="#1A1A1A" stroke-width="2"/>
  <path d="M102 5 L98 10 L106 9 Z" fill="#D32F2F"/>
  <path d="M102 5 L100 1 L104 3 Z" fill="#D32F2F"/>
  <!-- Left arm fist pump -->
  <line x1="32" y1="65" x2="22" y2="48" stroke="#1A1A1A" stroke-width="3" stroke-linecap="round"/>
  <circle cx="22" cy="48" r="5" fill="#C4A882" stroke="#1A1A1A" stroke-width="2"/>
  <!-- Feet - wider stance -->
  <ellipse cx="42" cy="102" rx="11" ry="5" fill="#C4A882" stroke="#1A1A1A" stroke-width="2"/>
  <ellipse cx="78" cy="102" rx="11" ry="5" fill="#C4A882" stroke="#1A1A1A" stroke-width="2"/>
  <!-- Exclamation marks -->
  <text x="15" y="50" font-size="14" fill="#D32F2F" font-family="sans-serif" font-weight="bold">!</text>
  <text x="105" y="55" font-size="14" fill="#D32F2F" font-family="sans-serif" font-weight="bold">!</text>
</svg>
